<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 12px; font-size: 13px; background: #333; color: #fff; }
    h2 { font-size: 14px; margin: 0 0 12px; }
    #loading { color: #c7c7c7; margin-bottom: 8px; }
    .controls { display: flex; flex-direction: column; align-items: flex-start; gap: 16px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #4f4f4f; flex-wrap: wrap; }
    .controls label { font-size: 12px; color: #c7c7c7; display: flex; align-items: center; gap: 6px; }
    #qualityLabel { font-weight: 600; color: #fff; }
    select, input[type=range] { font-size: 12px; padding: 4px; border-radius: 4px; border: none; background: #444; color: white; }
    button.compress-all { padding: 6px 12px; background: transparent; border: 1px solid #4f4f4f; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; letter-spacing: 0.5px; }
    button.compress-all:hover { background: #444; }
    .asset { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #4f4f4f; }
    .asset img { width: 48px; height: 48px; object-fit: cover; border-radius: 4px; background: #eee; flex-shrink: 0; }
    .video-thumb { width: 48px; height: 48px; border-radius: 4px; background: #222; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0; }
    .info { flex: 1; overflow: hidden; }
    .name { font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta { color: #888; font-size: 11px; }
    .size { font-weight: 400; white-space: nowrap; min-width: 60px; text-align: right; }
    .size.large { color: #e05252; }
    .compress-btn { padding: 4px 8px; font-size: 12px; color: white; background: transparent; border: 1px solid #4f4f4f; border-radius: 4px; cursor: pointer; white-space: nowrap; letter-spacing: 0.5px; }
    .compress-btn:hover { background: #444; }
    .compress-btn:disabled { background: #ccc; cursor: default; }
  </style>
</head>
<body>
  <h2>Asset Inspector</h2>

  <!-- Controls: format and quality settings, shown at the top -->
  <div class="controls">
    <label>Format:
      <select id="format">
        <option value="image/jpeg">JPEG</option>
        <option value="image/webp">WebP</option>
      </select>
    </label>
    <label>Quality: <span id="qualityLabel">80%</span>
      <input type="range" id="quality" min="10" max="100" value="80"
        oninput="document.getElementById('qualityLabel').textContent = this.value + '%'" />
    </label>
    <button class="compress-all" onclick="compressAll()">Compress all images</button>
  </div>

  <!-- Status message: shows "Scanning..." then "Scan complete." -->
  <div id="loading">Scanning assets...</div>

  <!-- Assets list: populated dynamically as assets arrive from code.js -->
  <div id="list"></div>

  <!-- Hidden canvas used for image compression — never visible to the user -->
  <canvas id="canvas" style="display:none"></canvas>

  <script>
    // In-memory store of all image assets received from code.js
    // Used by compressAll() to loop through and compress each one
    const assets = [];

    // Converts a plain byte array to a base64 string
    // Needed to display images as <img src="data:image/png;base64,..."> in the UI
    function bytesToBase64(bytes) {
      const uint8 = new Uint8Array(bytes);
      let binary = '';
      for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
      return btoa(binary);
    }

    // Compresses image bytes using the browser's Canvas API
    // Takes raw bytes, draws them onto a canvas, then re-encodes at the chosen format/quality
    // Returns a Promise that resolves with the compressed bytes as a plain array
    function compressBytes(bytes, format, quality) {
      return new Promise((resolve) => {
        // Create a blob URL from the raw bytes so we can load it as an image
        const blob = new Blob([new Uint8Array(bytes)], { type: 'image/png' });
        const url = URL.createObjectURL(blob);

        const img = new Image();
        img.onload = () => {
          console.log(`Image loaded for compression: ${img.naturalWidth}x${img.naturalHeight}px`);

          // Size the canvas to match the image exactly
          const canvas = document.getElementById('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;

          // Draw the image onto the canvas
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          // Re-encode the canvas contents at the chosen format and quality (0–1 scale)
          canvas.toBlob((blob) => {
            blob.arrayBuffer().then(buf => {
              const compressedBytes = Array.from(new Uint8Array(buf));
              console.log(`Compressed size: ${Math.round(compressedBytes.length / 1024)} KB`);
              URL.revokeObjectURL(url); // Free memory
              resolve(compressedBytes);
            });
          }, format, quality / 100);
        };

        img.src = url;
      });
    }

    // Compresses a single asset and sends the result to code.js
    async function compressAsset(asset) {
      const format = document.getElementById('format').value;
      const quality = parseInt(document.getElementById('quality').value);
      const btn = document.getElementById('btn-' + asset.nodeId);

      console.log(`Starting compression for: ${asset.nodeName} (${asset.sizeKB} KB) → format: ${format}, quality: ${quality}%`);

      btn.disabled = true;
      btn.textContent = 'Compressing...';

      const compressed = await compressBytes(asset.bytes, format, quality);

      console.log(`Sending compressed bytes to code.js for node: ${asset.nodeId}`);

      // Send compressed bytes back to code.js to replace the fill in Figma
      parent.postMessage({
        pluginMessage: {
          type: 'compress',
          nodeId: asset.nodeId,
          bytes: compressed
        }
      }, '*');
    }

    // Loops through all images and compresses them one by one
    // Sequential (not parallel) to avoid memory issues
    async function compressAll() {
      console.log(`Compressing all ${assets.length} images...`);
      for (const asset of assets) {
        if (asset.type === 'image') await compressAsset(asset);
      }
      console.log('All done.');
    }

    // Listens for messages from code.js
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // Received a new asset from the scanner in code.js
      if (msg.type === 'asset') {
        const asset = msg.data;
        console.log(`Asset received: ${asset.nodeName} | type: ${asset.type} | size: ${asset.sizeKB || '—'} KB`);

        // Only store images (not videos) since we can only compress those
        if (asset.type === 'image') assets.push(asset);

        // Hide the "Scanning..." message once first asset arrives
        document.getElementById('loading').style.display = 'none';

        const list = document.getElementById('list');
        const div = document.createElement('div');
        div.className = 'asset';
        div.id = 'asset-' + asset.nodeId;

        if (asset.type === 'image') {
          // Convert bytes to base64 to render as a thumbnail
          const src = `data:image/png;base64,${bytesToBase64(asset.bytes)}`;
          div.innerHTML = `
            <img src="${src}" />
            <div class="info">
              <div class="name">${asset.nodeName}</div>
            </div>
            <div class="size ${asset.sizeKB > 500 ? 'large' : ''}">${asset.sizeKB} KB</div>
            <button class="compress-btn" id="btn-${asset.nodeId}"
              onclick="compressAsset(assets.find(a => a.nodeId === '${asset.nodeId}'))">
              Compress
            </button>
          `;
        } else {
          // Videos: show but mark as not compressible
          div.innerHTML = `
            <div class="video-thumb">▶</div>
            <div class="info">
              <div class="name">${asset.nodeName}</div>
              <div class="meta">${asset.page}</div>
            </div>
            <div class="size" style="color:#aaa">video</div>
          `;
        }

        list.appendChild(div);
      }

      // code.js confirmed it replaced the fill — update the UI to show new size
      if (msg.type === 'compressed') {
        console.log(`Compression confirmed by code.js for node: ${msg.nodeId} | new size: ${msg.newSizeKB} KB`);

        const assetEl = document.getElementById('asset-' + msg.nodeId);
        const btn = document.getElementById('btn-' + msg.nodeId);

        if (btn) {
          btn.disabled = true;
          btn.textContent = '✅  Done';
          btn.style.background = 'transparent';
          btn.style.border = '1px solid #2da44e';
        }

        // Update displayed size — find .size inside this asset's row
        if (assetEl) {
          const sizeEl = assetEl.querySelector('.size');
          if (sizeEl) {
            // Guard against undefined in case newSizeKB wasn't sent correctly
            sizeEl.textContent = msg.newSizeKB !== undefined ? msg.newSizeKB + ' KB' : '— KB';
            sizeEl.className = 'size'; // Remove red highlight
          }
        }
      }

      // Scanner finished — show status
      if (msg.type === 'done') {
        console.log('Scan complete.');
        document.getElementById('loading').textContent = 'Scan complete.';
        document.getElementById('loading').style.display = 'block';
      }
    };
  </script>
</body>
</html>
