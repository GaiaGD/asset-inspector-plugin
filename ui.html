<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 12px; font-size: 13px; background: #2b2b2b; color: #fff; }
    h2 { font-size: 14px; margin: 0 0 12px; }
    #status { color: #c7c7c7; margin-bottom: 8px; font-size: 12px; }
    .controls { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; padding: 12px; border-bottom: 1px solid #4f4f4f; background: #2b2b2b; }
    .controls label { font-size: 12px; color: #c7c7c7; display: flex; align-items: center; gap: 6px; }
    select { font-size: 12px; padding: 4px; border-radius: 4px; border: none; background: #444; color: white; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type="range"]::-webkit-slider-runnable-track { background: #777; height: 1px; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 10px; width: 10px;
      border-radius: 50%;
      border: 1px solid #444;
      background: #a4a4a4;
      margin-top: -4px;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track { background: #4f4f4f; height: 2px; }
    input[type="range"]::-moz-range-thumb {
      height: 10px; width: 10px;
      border-radius: 50%;
      border: 1px solid #444;
      background: #a4a4a4;
      cursor: pointer;
    }

    .asset { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #4f4f4f; }
    .asset img { width: 64px; height: 64px; object-fit: cover; border-radius: 4px; background: #444; flex-shrink: 0; }
    .video-thumb { width: 64px; height: 64px; border-radius: 4px; background: #222; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0; }
    .info { flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
    .name { font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .size-row { display: flex; align-items: center; gap: 6px; font-size: 11px; padding-bottom: 10px; }
    .original-size { color: #e05252; font-weight: 600; }
    .original-size.ok { color: #c7c7c7; }
    .arrow { color: #888; }
    .estimated-size { color: #c7c7c7; font-weight: 600; }
    .slider-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #c7c7c7; }
    .quality-slider { width: 100px; }
    .quality-label { min-width: 30px; }

    .btn { padding: 4px 8px; font-size: 12px; color: white; background: transparent; border: 1px solid #4f4f4f; border-radius: 4px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .btn:hover { background: #444; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* Idle state shown before first scan */
    #idle { color: #888; font-size: 12px; padding: 24px 0; text-align: center; }
    #status { padding: 24px 0 0 0;}
  </style>
</head>
<body>
  <h2>Asset Inspector</h2>

  <!-- Controls: format selector + scan button -->
  <div class="controls">
    <button class="btn" onclick="scan()">Scan selected slide</button>
  </div>

  <!-- Status line: shown while scanning or after -->
  <div id="status" style="display:none"></div>

  <!-- Idle prompt: shown before first scan -->
  <div id="idle">Select a slide in Figma, then click Scan.</div>

  <!-- Asset list: populated after scan -->
  <div id="list"></div>

  <!-- Hidden canvas for compression and estimation -->
  <canvas id="canvas" style="display:none"></canvas>

  <script>
    // In-memory store of all image assets received from code.js
    const assets = [];

    // Debounce timers per node — prevents estimate from firing on every pixel of drag
    const debounceTimers = {};

    // Converts byte array to base64 for thumbnail display
    function bytesToBase64(bytes) {
      const uint8 = new Uint8Array(bytes);
      let binary = '';
      for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
      return btoa(binary);
    }

    // Compresses image bytes via Canvas API at given format and quality
    // Returns a Promise resolving with compressed bytes as plain array
    function compressBytes(bytes, format, quality) {
      return new Promise((resolve) => {
        const blob = new Blob([new Uint8Array(bytes)], { type: format });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const canvas = document.getElementById('canvas');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          canvas.toBlob((blob) => {
            blob.arrayBuffer().then(buf => {
              URL.revokeObjectURL(url);
              resolve(Array.from(new Uint8Array(buf)));
            });
          }, format, quality / 100);
        };
        img.src = url;
      });
    }

    // Triggers a scan of the current Figma selection
    function scan() {
      // Clear previous results
      assets.length = 0;
      document.getElementById('list').innerHTML = '';
      document.getElementById('idle').style.display = 'none';
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').textContent = 'Scanning...';

      // Tell code.js to scan the current selection
      parent.postMessage({ pluginMessage: { type: 'scan' } }, '*');
    }

    // Called when the per-image quality slider moves
    // Debounces 300ms then estimates compressed size without touching Figma
    function onSliderChange(nodeId) {
      const estimatedEl = document.getElementById('estimated-' + nodeId);
      estimatedEl.textContent = '...';

      clearTimeout(debounceTimers[nodeId]);

      debounceTimers[nodeId] = setTimeout(async () => {
        const asset = assets.find(a => a.nodeId === nodeId);
        const format = 'image/jpeg'; // Currently only JPEG is supported for compression
        const quality = parseInt(document.getElementById('slider-' + nodeId).value);

        document.getElementById('label-' + nodeId).textContent = quality + '%';

        console.log(`Estimating size for ${asset.nodeName} at ${quality}% ${format}`);

        // Compress in background just to get the size — doesn't touch Figma
        const compressed = await compressBytes(asset.bytes, format, quality);
        const estimatedKB = Math.round(compressed.length / 1024);

        estimatedEl.textContent = estimatedKB + ' KB';
        console.log(`Estimated: ${estimatedKB} KB`);
      }, 300);
    }

    // Compresses a single asset at its current slider quality and sends to code.js
    async function compressAsset(asset) {
      const format = 'image/jpeg'; // Currently only JPEG is supported for compression
      const quality = parseInt(document.getElementById('slider-' + asset.nodeId).value);
      const btn = document.getElementById('btn-' + asset.nodeId);

      console.log(`Compressing ${asset.nodeName} at ${quality}% ${format}`);

      btn.disabled = true;
      btn.textContent = 'Compressing...';

      const compressed = await compressBytes(asset.bytes, format, quality);

      // Send compressed bytes to code.js to replace the fill in Figma
      parent.postMessage({
        pluginMessage: { type: 'compress', nodeId: asset.nodeId, bytes: compressed }
      }, '*');
    }

    // Listens for messages from code.js
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // New asset received from scanner
      if (msg.type === 'asset') {
        const asset = msg.data;
        console.log(`Asset received: ${asset.nodeName} | ${asset.type} | ${asset.sizeKB || '—'} KB`);

        if (asset.type === 'image') assets.push(asset);

        document.getElementById('status').style.display = 'none';
        const list = document.getElementById('list');
        const div = document.createElement('div');
        div.className = 'asset';
        div.id = 'asset-' + asset.nodeId;

        if (asset.type === 'image') {
          const src = `data:image/png;base64,${bytesToBase64(asset.bytes)}`;
          const isLarge = asset.sizeKB > 500;
          div.innerHTML = `
            <img src="${src}" />
            <div class="info">
              <div class="name">${asset.nodeName}</div>
              <div class="size-row">
                <span class="original-size ${isLarge ? '' : 'ok'}">${asset.sizeKB} KB</span>
                <span class="arrow">→</span>
                <span class="estimated-size" id="estimated-${asset.nodeId}">move slider</span>
              </div>
              <div class="slider-row">
                <input type="range" class="quality-slider" id="slider-${asset.nodeId}"
                  min="10" max="100" value="100"
                  oninput="onSliderChange('${asset.nodeId}')" />
                <span class="quality-label" id="label-${asset.nodeId}">100%</span>
              </div>
            </div>
            <button class="btn" id="btn-${asset.nodeId}"
              onclick="compressAsset(assets.find(a => a.nodeId === '${asset.nodeId}'))">
              Compress
            </button>
          `;
        } else {
          div.innerHTML = `
            <div class="video-thumb">▶</div>
            <div class="info">
              <div class="name">${asset.nodeName}</div>
              <div class="size-row"><span style="color:#888">video — cannot compress</span></div>
            </div>
          `;
        }

        list.appendChild(div);
      }

      // No slide was selected when Scan was clicked
      if (msg.type === 'error') {
        document.getElementById('status').textContent = msg.message;
        document.getElementById('status').style.display = 'block';
        console.warn(msg.message);
      }

      // code.js confirmed compression — update the row
      if (msg.type === 'compressed') {
        console.log(`Confirmed: ${msg.nodeId} → ${msg.newSizeKB} KB`);

        const assetEl = document.getElementById('asset-' + msg.nodeId);
        const btn = document.getElementById('btn-' + msg.nodeId);

        if (btn) {
          btn.disabled = true;
          btn.textContent = '✅ Done';
        }

        if (assetEl) {
          const originalEl = assetEl.querySelector('.original-size');
          const estimatedEl = assetEl.querySelector('.estimated-size');
          const sliderRow = assetEl.querySelector('.slider-row');
          if (originalEl) { originalEl.textContent = (msg.newSizeKB || '—') + ' KB'; originalEl.className = 'original-size ok'; }
          if (estimatedEl) estimatedEl.textContent = '';
          if (sliderRow) sliderRow.style.display = 'none';
        }
      }

      // Scan finished
      if (msg.type === 'done') {
        console.log('Scan complete.');
        const count = assets.length;
        document.getElementById('status').textContent = `Scan complete — ${count} image${count !== 1 ? 's' : ''} found.`;
        document.getElementById('status').style.display = 'block';
      }
    };
  </script>
</body>
</html>
